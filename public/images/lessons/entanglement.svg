    <circle cx="-70" cy="0" r="52" fill="url(#p1)"/>
    <circle cx="120" cy="0" r="52" fill="url(#p2)"/>
    <text x="-70" y="9" fill="#042f2e" font-family="system-ui, sans-serif" font-size="30" font-weight="700" text-anchor="middle">A</text>
    <text x="120" y="9" fill="#4c0519" font-family="system-ui, sans-serif" font-size="30" font-weight="700" text-anchor="middle">B</text>
  </g>
  <g transform="translate(560 200)">
    <text fill="#5eead4" font-family="system-ui, sans-serif" font-size="24">Lesson 3</text>
    <text y="52" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="52" font-weight="700">Entanglement</text>
    <text y="104" fill="#ccfbf1" font-family="system-ui, sans-serif" font-size="26">Correlations across any distance</text>
  </g>
