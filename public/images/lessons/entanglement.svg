<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" role="img" aria-label="Two entangled particles linked together">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#083344"/>
      <stop offset="1" stop-color="#134e4a"/>
    </linearGradient>
    <radialGradient id="p1" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </radialGradient>
    <radialGradient id="p2" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#fca5a5"/>
      <stop offset="1" stop-color="#f43f5e"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="480" fill="url(#bg3)"/>
  <g transform="translate(260 240)">
