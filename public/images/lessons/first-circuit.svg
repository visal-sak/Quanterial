<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" role="img" aria-label="A simple two-qubit quantum circuit that creates a Bell state">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="480" fill="url(#bg5)"/>
  <g transform="translate(90 150)" stroke="#94a3b8" stroke-width="3">
    <line x1="0" y1="0" x2="440" y2="0"/>
    <line x1="0" y1="120" x2="440" y2="120"/>
  </g>
  <g transform="translate(90 150)">
    <text x="-40" y="8" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="24" text-anchor="middle">q0</text>
    <text x="-40" y="128" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="24" text-anchor="middle">q1</text>
    <g transform="translate(70 -35)">
      <rect width="70" height="70" rx="10" fill="#f59e0b"/>
      <text x="35" y="47" fill="#1c1917" font-family="system-ui, sans-serif" font-size="34" font-weight="700" text-anchor="middle">H</text>
    </g>
    <g transform="translate(250 0)">
      <circle cx="35" cy="0" r="10" fill="#38bdf8"/>
      <line x1="35" y1="0" x2="35" y2="120" stroke="#38bdf8" stroke-width="3"/>
      <circle cx="35" cy="120" r="26" fill="none" stroke="#38bdf8" stroke-width="3"/>
      <line x1="35" y1="98" x2="35" y2="142" stroke="#38bdf8" stroke-width="3"/>
      <line x1="13" y1="120" x2="57" y2="120" stroke="#38bdf8" stroke-width="3"/>
    </g>
  </g>
  <g transform="translate(600 200)">
    <text fill="#7dd3fc" font-family="system-ui, sans-serif" font-size="24">Lesson 5</text>
    <text y="52" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="52" font-weight="700">Your First Circuit</text>
    <text y="104" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="26">Build a Bell state, step by step</text>
  </g>
</svg>
