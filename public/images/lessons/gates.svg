<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" role="img" aria-label="Quantum gates placed on a qubit wire">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c0a09"/>
      <stop offset="1" stop-color="#1c1917"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="480" fill="url(#bg4)"/>
  <g transform="translate(90 240)">
    <line x1="0" y1="0" x2="430" y2="0" stroke="#a8a29e" stroke-width="3"/>
    <g transform="translate(70 -40)">
      <rect width="80" height="80" rx="12" fill="#f59e0b"/>
      <text x="40" y="52" fill="#1c1917" font-family="system-ui, sans-serif" font-size="38" font-weight="700" text-anchor="middle">H</text>
    </g>
    <g transform="translate(230 -40)">
      <rect width="80" height="80" rx="12" fill="#38bdf8"/>
      <text x="40" y="52" fill="#0c1a2a" font-family="system-ui, sans-serif" font-size="38" font-weight="700" text-anchor="middle">X</text>
    </g>
    <g transform="translate(350 -40)">
      <rect width="80" height="80" rx="12" fill="#34d399"/>
      <text x="40" y="52" fill="#052e2b" font-family="system-ui, sans-serif" font-size="38" font-weight="700" text-anchor="middle">Z</text>
    </g>
    <text x="-40" y="9" fill="#e7e5e4" font-family="system-ui, sans-serif" font-size="26" text-anchor="middle">|0&#10217;</text>
  </g>
  <g transform="translate(600 200)">
    <text fill="#fbbf24" font-family="system-ui, sans-serif" font-size="24">Lesson 4</text>
    <text y="52" fill="#fafaf9" font-family="system-ui, sans-serif" font-size="52" font-weight="700">Quantum Gates</text>
    <text y="104" fill="#e7e5e4" font-family="system-ui, sans-serif" font-size="26">Operations that transform qubits</text>
  </g>
</svg>
